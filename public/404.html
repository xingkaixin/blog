<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — 页面未找到 | 行开心的颠倒世界</title>
<meta name="robots" content="noindex" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f7f3eb;color:#3c3528;min-height:100dvh;display:grid;place-items:center;padding:2rem}
.card{border:1px solid rgb(255 255 255 / 0.2);background:rgb(255 255 255 / 0.72);border-radius:2.6rem;padding:3rem 2rem;text-align:center;box-shadow:0 28px 80px -48px rgb(31 24 18 / 0.6),inset 0 1px 0 rgb(255 255 255 / 0.8);max-width:28rem;width:100%}
.card .code{font-size:.75rem;letter-spacing:.32em;color:#8c8276;text-transform:uppercase;margin-bottom:1rem}
.card h1{font-size:2.5rem;font-weight:700;letter-spacing:-.04em;color:#3c3528;margin-bottom:.75rem}
.card p{color:#6b6257;line-height:1.75;margin-bottom:1.5rem}
.card a{display:inline-block;border-radius:2.5rem;background:#3c3528;color:#f7f3eb;padding:.75rem 2rem;text-decoration:none;font-size:.875rem;font-weight:500;transition:background .2s}
.card a:hover{background:#5a5040}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>页面未找到</h1>
  <p>这篇内容可能已经删除、移动，或者链接已经过期。</p>
  <a href="/">返回首页</a>
</div>
</body>
</html>
